<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presence Detection</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e0e0e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.2rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 2.5rem;
  }
  .main-indicator {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
    transition: background 0.6s, border-color 0.6s;
    border: 2px solid #333;
    position: relative;
  }
  .main-indicator.empty {
    background: #0d1a0d;
    border-color: #1a4a1a;
  }
  .main-indicator.detected {
    background: #1a0d0d;
    border-color: #7a1a1a;
    animation: pulse-red 1.5s infinite;
  }
  .main-indicator.calibrating {
    background: #0d0d1a;
    border-color: #1a1a5a;
    animation: pulse-blue 2s infinite;
  }
  .main-indicator.warmup {
    background: #111;
    border-color: #333;
  }
  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,40,40,0.3); }
    50% { box-shadow: 0 0 0 24px rgba(200,40,40,0); }
  }
  @keyframes pulse-blue {
    0%, 100% { box-shadow: 0 0 0 0 rgba(40,80,200,0.3); }
    50% { box-shadow: 0 0 0 20px rgba(40,80,200,0); }
  }
  .status-icon {
    font-size: 3rem;
    margin-bottom: 0.5rem;
    line-height: 1;
  }
  .status-text {
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .status-text.empty { color: #4caf50; }
  .status-text.detected { color: #f44336; }
  .status-text.calibrating { color: #4488ff; }
  .status-text.warmup { color: #666; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    width: 100%;
    max-width: 500px;
    margin-bottom: 2rem;
  }
  .metric {
    background: #111118;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .metric-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 0.4rem;
  }
  .metric-value {
    font-size: 1.3rem;
    font-weight: 500;
    color: #ccc;
    font-variant-numeric: tabular-nums;
  }

  .chart-container {
    width: 100%;
    max-width: 500px;
    background: #111118;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .chart-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 0.75rem;
  }
  canvas { width: 100%; display: block; }

  .log {
    width: 100%;
    max-width: 500px;
    background: #111118;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 1rem;
  }
  .log-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 0.75rem;
  }
  .log-entry {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid #1a1a1a;
    font-size: 0.82rem;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .log-dot.detected { background: #f44336; }
  .log-dot.empty { background: #4caf50; }
  .log-time { color: #444; font-size: 0.75rem; font-variant-numeric: tabular-nums; min-width: 55px; }
  .log-msg { color: #888; }

  .conn-badge {
    position: fixed;
    top: 1rem; right: 1rem;
    padding: 0.3rem 0.75rem;
    border-radius: 999px;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .conn-badge.connected { background: #0d1a0d; color: #4caf50; border: 1px solid #1a4a1a; }
  .conn-badge.disconnected { background: #1a0d0d; color: #f44336; border: 1px solid #3a1a1a; }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: #1a1a2a;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 0.75rem;
  }
  .progress-fill {
    height: 100%;
    background: #4488ff;
    border-radius: 2px;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<div class="conn-badge disconnected" id="conn-badge">Disconnected</div>

<h1>Presence Detection</h1>

<div class="main-indicator warmup" id="indicator">
  <div class="status-icon" id="status-icon">○</div>
  <div class="status-text warmup" id="status-text">Connecting...</div>
  <div id="progress-wrap" style="display:none; width:80%; margin-top:0.75rem;">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="metrics">
  <div class="metric">
    <div class="metric-label">RSSI</div>
    <div class="metric-value" id="m-rssi">—</div>
  </div>
  <div class="metric">
    <div class="metric-label">Variance</div>
    <div class="metric-value" id="m-var">—</div>
  </div>
  <div class="metric">
    <div class="metric-label">Threshold</div>
    <div class="metric-value" id="m-thr">—</div>
  </div>
</div>

<div class="chart-container">
  <div class="chart-label">RSSI signal</div>
  <canvas id="rssi-chart" height="60"></canvas>
</div>

<div class="chart-container">
  <div class="chart-label">Variance vs threshold</div>
  <canvas id="var-chart" height="60"></canvas>
</div>

<div class="log">
  <div class="log-label">Event log</div>
  <div id="log-list">
    <div class="log-entry">
      <div class="log-dot" style="background:#333"></div>
      <div class="log-time">--:--:--</div>
      <div class="log-msg">Waiting for connection...</div>
    </div>
  </div>
</div>

<script>
const rssiData = Array(80).fill(null);
const varData = Array(80).fill(null);
let threshold = null;
let lastPresence = null;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, duration, type='sine', vol=0.3) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function beepDetected() {
  beep(880, 0.15, 'sine', 0.4);
  setTimeout(() => beep(1100, 0.2, 'sine', 0.3), 120);
}

function beepEmpty() {
  beep(660, 0.15, 'sine', 0.25);
  setTimeout(() => beep(440, 0.2, 'sine', 0.2), 120);
}

function timestamp() {
  return new Date().toTimeString().slice(0,8);
}

function addLog(type, msg) {
  const list = document.getElementById('log-list');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<div class="log-dot ${type}"></div><div class="log-time">${timestamp()}</div><div class="log-msg">${msg}</div>`;
  list.insertBefore(entry, list.firstChild);
  while(list.children.length > 8) list.removeChild(list.lastChild);
}

function setIndicator(mode, icon, text) {
  const el = document.getElementById('indicator');
  const iconEl = document.getElementById('status-icon');
  const textEl = document.getElementById('status-text');
  el.className = `main-indicator ${mode}`;
  iconEl.textContent = icon;
  textEl.className = `status-text ${mode}`;
  textEl.textContent = text;
}

function drawChart(canvasId, data, color, thresholdVal) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 460;
  const H = 60;
  canvas.width = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  const valid = data.filter(v => v !== null);
  if (valid.length < 2) return;

  const min = Math.min(...valid) - 2;
  const max = Math.max(...valid) + 2;
  const range = max - min || 1;

  function px(i) { return (i / (data.length - 1)) * W; }
  function py(v) { return H - ((v - min) / range) * (H - 4) - 2; }

  if (thresholdVal !== null && thresholdVal >= min && thresholdVal <= max) {
    const ty = py(thresholdVal);
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = '#553333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, ty);
    ctx.lineTo(W, ty);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  let first = true;
  for (let i = 0; i < data.length; i++) {
    if (data[i] === null) { first = true; continue; }
    if (first) { ctx.moveTo(px(i), py(data[i])); first = false; }
    else ctx.lineTo(px(i), py(data[i]));
  }
  ctx.stroke();
}

function connect() {
  const ws = new WebSocket('ws://localhost:8765');

  ws.onopen = () => {
    document.getElementById('conn-badge').className = 'conn-badge connected';
    document.getElementById('conn-badge').textContent = 'Connected';
    setIndicator('warmup', '○', 'Warming up...');
    addLog('', 'Connected to ESP32-C6');
  };

  ws.onclose = () => {
    document.getElementById('conn-badge').className = 'conn-badge disconnected';
    document.getElementById('conn-badge').textContent = 'Disconnected';
    setIndicator('warmup', '○', 'Disconnected');
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);

    if (d.type === 'warmup') {
      setIndicator('warmup', '○', `Warming up ${d.count}/${d.total}`);
      return;
    }

    if (d.type === 'calibrating') {
      setIndicator('calibrating', '◎', `Calibrating — ${d.remaining}s`);
      document.getElementById('progress-wrap').style.display = 'block';
      document.getElementById('prog-fill').style.width = d.progress + '%';
      document.getElementById('m-rssi').textContent = d.rssi + ' dBm';
      document.getElementById('m-var').textContent = d.variance.toFixed(1);
      rssiData.push(d.rssi); rssiData.shift();
      varData.push(d.variance); varData.shift();
      drawChart('rssi-chart', rssiData, '#4488ff', null);
      drawChart('var-chart', varData, '#4488ff', null);
      return;
    }

    if (d.type === 'calibrated') {
      threshold = d.threshold;
      document.getElementById('progress-wrap').style.display = 'none';
      document.getElementById('m-thr').textContent = d.threshold.toFixed(1);
      addLog('', `Calibrated — threshold ${d.threshold.toFixed(1)}`);
      beep(520, 0.1); setTimeout(() => beep(660, 0.1), 100); setTimeout(() => beep(880, 0.2), 200);
      return;
    }

    if (d.type === 'detection') {
      rssiData.push(d.rssi); rssiData.shift();
      varData.push(d.variance); varData.shift();

      document.getElementById('m-rssi').textContent = d.rssi + ' dBm';
      document.getElementById('m-var').textContent = d.variance.toFixed(1);
      document.getElementById('m-thr').textContent = d.threshold.toFixed(1);

      drawChart('rssi-chart', rssiData, '#22aaff', null);
      drawChart('var-chart', varData, d.presence ? '#ff4444' : '#44aa88', d.threshold);

      if (d.presence) {
        setIndicator('detected', '●', 'Person detected');
      } else {
        setIndicator('empty', '●', 'Room empty');
      }

      if (d.changed) {
        if (d.presence) {
          beepDetected();
          addLog('detected', 'Person detected');
        } else {
          beepEmpty();
          addLog('empty', 'Room empty');
        }
      }
    }
  };
}

connect();
setInterval(() => {
  drawChart('rssi-chart', rssiData, '#22aaff', null);
  drawChart('var-chart', varData, lastPresence ? '#ff4444' : '#44aa88', threshold);
}, 100);
</script>
</body>
</html>
